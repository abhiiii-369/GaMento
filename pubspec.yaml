name: gamento

description: Memory Game App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  google_sign_in: ^7.0.0
  cloud_firestore: ^6.0.0
  url_launcher: ^6.3.0

  provider: ^6.1.2
  shared_preferences: ^2.3.0
  audioplayers: ^6.0.0
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  video_player: ^2.9.1
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"

flutter_native_splash:
  color: "#0D1117"
  image: assets/icon/splash_icon.png

  android_12:
    image: assets/icon/splash_icon.png
    color: "#0D1117"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/sounds/
    - assets/animations/
    - assets/icon/
    - assets/videos/